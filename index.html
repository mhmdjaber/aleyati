<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALEYATI | Machine Loss Counter</title>
  <meta name="description" content="ALEYATI is a tracking website that displays counted statistics and monitored data about destroyed war machines.">
  <meta name="robots" content="index, follow">

  <link rel="icon" href="logo.jpeg" type="image/jpeg">
  <link rel="apple-touch-icon" href="logo.jpeg">

  <meta property="og:title" content="ALEYATI | Machine Loss Counter">
  <meta property="og:description" content="ALEYATI is a tracking website that displays counted statistics and monitored data about destroyed war machines.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aleyati.com">
  <meta property="og:image" content="https://aleyati.com/logo.jpeg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ALEYATI | Machine Loss Counter">
  <meta name="twitter:description" content="ALEYATI is a tracking website that displays counted statistics and monitored data about destroyed war machines.">
  <meta name="twitter:image" content="https://aleyati.com/logo.jpeg">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B9PE05YWXV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-B9PE05YWXV');
  </script>

  <!-- OneSignal Notifications -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "7a924a4f-c2ae-4122-861a-7fc7cbf3fe7a",
        notifyButton: {
          enable: true
        }
      });
    });
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="logo.jpeg" alt="Aleyati Logo">
        <span>ALEYATI</span>
      </a>
    </div>
  </nav>

  <main class="machines-container">
    <div class="machine-card" data-id="1">
      <img src="New Project (6).png" alt="Merkava tank">
      <h2>MERKAVA</h2>
    </div>

    <div class="machine-card" data-id="2">
      <img src="car.jpeg" alt="War machine vehicle">
      <h2>WAR MACHINES</h2>
    </div>

    <div class="machine-card" data-id="3">
      <img src="hermes.jpg" alt="Air forces">
      <h2>AIR FORCES</h2>
    </div>

    <div class="machine-card" data-id="4">
      <img src="New Project (24).png.jpeg" alt="Naval forces">
      <h2>NAVAL FORCES</h2>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 ALEYATI. All rights reserved.</p>
  </footer>

  <script src="home.js"></script>

  <script>
    const isIPhone = /iPhone|iPad|iPod/.test(navigator.userAgent);

    if (isIPhone) {
      const banner = document.createElement("div");
      banner.innerHTML = "📱 iPhone users: Add ALEYATI to your Home Screen to receive notifications.";

      banner.style.position = "fixed";
      banner.style.bottom = "0";
      banner.style.left = "0";
      banner.style.width = "100%";
      banner.style.background = "black";
      banner.style.color = "white";
      banner.style.textAlign = "center";
      banner.style.padding = "12px";
      banner.style.zIndex = "9999";
      banner.style.fontSize = "14px";

      document.body.appendChild(banner);

      setTimeout(() => {
        banner.remove();
      }, 20000);
    } else {
      const notifyBox = document.createElement("div");
      notifyBox.id = "notifyBox";
      notifyBox.style.position = "fixed";
      notifyBox.style.bottom = "20px";
      notifyBox.style.left = "50%";
      notifyBox.style.transform = "translateX(-50%)";
      notifyBox.style.background = "black";
      notifyBox.style.color = "white";
      notifyBox.style.padding = "15px 20px";
      notifyBox.style.borderRadius = "8px";
      notifyBox.style.zIndex = "9999";
      notifyBox.style.textAlign = "center";
      notifyBox.style.maxWidth = "90%";
      notifyBox.style.boxShadow = "0 4px 12px rgba(0,0,0,0.3)";

      notifyBox.innerHTML = `
        🚨 Get notified when new updates are added.<br><br>
        <button id="enableNotif" style="margin-right:10px; padding:8px 14px; border:none; border-radius:5px; cursor:pointer;">Enable Notifications</button>
        <button id="laterNotif" style="padding:8px 14px; border:none; border-radius:5px; cursor:pointer;">Later</button>
      `;

      document.body.appendChild(notifyBox);

      document.getElementById("enableNotif").onclick = function () {
        OneSignalDeferred.push(async function(OneSignal) {
          await OneSignal.showNativePrompt();
        });
        notifyBox.remove();
      };

      document.getElementById("laterNotif").onclick = function () {
        notifyBox.remove();
      };
    }
  </script>
</body>
</html>
