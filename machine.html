<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aleyati – Machine Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="machine.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "7a924a4f-c2ae-4122-861a-7fc7cbf3fe7a",
    notifyButton: {
      enable: true
    }
  });
});
</script>

</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <img src="logo.jpeg" alt="Aleyati Logo">
      <span>ALEYATI</span>
    </a>
  </div>
</nav>

<div id="page-subtypes" class="page hidden">
  <div class="big-number" id="subtypesBigNumber">01</div>
  <h1 id="subtypesTitle">Select Type</h1>
  <div class="subtypes-grid" id="subtypesGrid"></div>
  <div class="back-link" id="backToHomeFromSubtypes">← Back to Home</div>
</div>

<div id="page-dates" class="page hidden">
  <div class="big-number" id="datesBigNumber">01</div>
  <h1 id="datesMachineName">Machine Details</h1>
  <ul class="vertical-list" id="datesList"></ul>
  <div class="back-link" id="backFromDates">← Back</div>
</div>

<div id="page-hours" class="page hidden">
  <div class="big-number" id="hoursBigNumber">01</div>
  <h1 id="hoursTitle">Hourly Details</h1>
  <ul class="vertical-list" id="hoursList"></ul>
  <div class="back-link" id="backToDates">← Back to dates</div>
</div>

<div id="modal" class="modal">
  <div class="modal-card">
    <img id="modalImage" src="" alt="Location">
    <div class="modal-card-content">
      <h3 id="modalTitle">Location & Time</h3>
      <p id="modalDescription">Details will appear here.</p>
      <button class="close-modal" id="closeModal">Close</button>
    </div>
  </div>
</div>

<script src="machine.js"></script>
</body>
</html>
